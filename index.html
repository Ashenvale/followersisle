<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evermark — Mundos</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #070b14; font-family: system-ui, sans-serif; }
    #app { position: fixed; inset: 0; }

    /* ---- Menú ---- */
    #menu {
      position: fixed; inset: 0; z-index: 30; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 42px;
      background: radial-gradient(circle at 50% 30%, #1a2c4a, #070b14 70%);
      transition: opacity .45s ease;
    }
    #menu.hidden { opacity: 0; pointer-events: none; }
    #menu h1 {
      font-family: "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: 56px; letter-spacing: 3px; color: #f4e9d0;
      text-shadow: 0 4px 24px rgba(0,0,0,.6);
    }
    #menu .tag { color: #9fb4d4; font-size: 15px; margin-top: -28px; letter-spacing: 1px; }
    .cards { display: flex; gap: 28px; flex-wrap: wrap; justify-content: center; }
    .card {
      width: 300px; height: 200px; border-radius: 18px; cursor: pointer; position: relative;
      overflow: hidden; border: 1px solid rgba(160,190,255,.25);
      background: linear-gradient(160deg, #20324f, #131d30);
      box-shadow: 0 12px 40px rgba(0,0,0,.45);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .card:hover { transform: translateY(-6px) scale(1.02); border-color: #6fa8ff; box-shadow: 0 20px 54px rgba(40,90,180,.4); }
    .card .thumb { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: .55; }
    .card .veil { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(7,11,20,0) 40%, rgba(7,11,20,.85)); }
    .card .label { position: absolute; left: 18px; bottom: 14px; z-index: 2; }
    .card .label .t { font-family: Georgia, serif; font-size: 26px; color: #f4e9d0; }
    .card .label .s { font-size: 13px; color: #b9c8e0; margin-top: 2px; }
    .card .num {
      position: absolute; top: 12px; right: 16px; z-index: 2; font-size: 40px; font-weight: 800;
      color: rgba(255,255,255,.16); font-family: Georgia, serif;
    }

    /* ---- HUD / controles en mundo ---- */
    #back {
      position: fixed; top: 16px; left: 16px; z-index: 25; display: none; cursor: pointer;
      background: rgba(10,16,28,.6); color: #dfe9ff; border: 1px solid rgba(160,190,255,.3);
      padding: 8px 14px; border-radius: 10px; backdrop-filter: blur(6px); font-size: 14px;
    }
    #back:hover { background: rgba(40,70,120,.7); }
    #hud {
      position: fixed; top: 16px; right: 18px; z-index: 20; display: none;
      color: #dfe9ff; background: rgba(10,16,28,.55); padding: 8px 14px; border-radius: 10px;
      backdrop-filter: blur(6px); font-size: 14px;
    }
    #hint {
      position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); z-index: 20; display: none;
      font-size: 12px; color: #aebfd6; background: rgba(10,16,28,.55);
      padding: 6px 14px; border-radius: 20px; backdrop-filter: blur(6px); pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="menu">
    <h1>EVERMARK</h1>
    <div class="tag">Elige un mundo</div>
    <div class="cards">
      <div class="card" data-world="3">
        <div class="veil"></div>
        <div class="num">★</div>
        <div class="label"><div class="t">Constructor</div><div class="s">Constructor de terreno</div></div>
      </div>
    </div>
  </div>

  <div id="back">← Menú</div>
  <div id="hud"></div>
  <div id="hint"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./main.js"></script>
</body>
</html>
